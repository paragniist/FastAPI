{% include 'layout.html' %}
<div class="container">
    <div class="card">
        <div class="card-header">
            Login
        </div>
        <div class="card-body">
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" autocomplete="username" required/>
                </div>
                  <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" autocomplete="password" required/>
                </div>
                <button class="btn btn-outline-primary">Login</button>
            </form>
        </div>
        <div class="card-footer test-muted">
           <a href="/auth/register-page">Register?</a>
        </div>
    </div>
</div>
